<html>
    <head>
        <title>0420-JavaScript輸出與輸入</title>
        <!--HTML註解-->
        <style>
            /* CSS註解 */
        </style>
        <script>
            //ㄉ行註解
            /*JS多行註解*/
            function sayhello() {
                name=prompt("你叫什麼名字?");
                console.log(name);    /*藏在開發人員工具裡的*/
                document.getElementById("msg").innerHTML="Hello"+name;
            }
            function calc() {
                userAns=parseInt(prompt("你認為答案是多少?"));

                n1=parseInt(document.getElementById("n1").value);
                n2=parseInt(document.getElementById("n2").value);
                if(isNaN(n1)) n1=0;
                n2=isNaN(n2)? 0 : n2;

                document.getElementById("ans").value="答案是"+(n1+n2);
            }
            function change() {
                document.getElementById("rgn").innerHTML=document.getElementById("rg").value;
            }
/*  window 函式
            alert("訊息");
            答案=prompt("問答");
                答案為 string 或 null
            是否=comfirm("確認");
                是否為 true/false

        console.log("開發人員訊息");

        document.getElementById("元素id") 透過id取的網頁元素
            一般容器元素.innerHTML 元素容器內的網頁內容
            input元素.value

        整數=parseInt(文字) 把
*/
        </script>
    </head>
    <body>
        <!--呼叫一個函式 body onload="sayhello();"-->
        <button onclick="sayhello();">打招呼</button><!--按鈕按下後呼叫一個函式-->
        <div id="msg"></div>
        <hr>
        <!--輸入方式-->
        <input type="text"><br>
        <input type="password"><br>
        <input type="number"><br>
        <input type="date"><br>
        <input type="datetime-local"><br>
        <input type="color">
        <input type="range" id="rg" value="0" oninput="change();"> <span id="rgn"></span>
        <hr>
        <input type="number" id="n1">+<input type="number" id="n2">=<button onclick="calc();">?</button><br>
        <input type="text" id="ans" disabled>


    </body>
</html>
