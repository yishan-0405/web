<html>
	<!-- 註解 --><!-- Ctrl+s存檔 --><!-- 換行是換給人看的 -->
	<head><!-- 網頁設定 -->
		<title>網頁標題</title>
	</head>
	<body><!-- 網頁內容 -->
		<!-- 區塊元素block:自己成行:h1~h6,p,hr-->
		<h1>標題一</h1><h2>標題二</h2>
		<h3>標題三</h3><h4>標題四</h4>
		<h5>標題五</h5><h6>標題六</h6>
		<hr><!-- 水平線 -->
		<p>段落文字</p>
		<p>
		段落文字段落文字<br><!-- 換行(給電腦看的) -->
		段落文字段落文字段落文字段落文字段落文
		字段落文字段落文字段落文字段落文字段落
		文字</p><hr>
		<!-- 行內元素inline:和別人共用一行 -->
		<!-- 格式標籤 -->
		<b>粗體</b><i>斜體</i><U>底線</U><s>刪除</s>
		<i><b>粗斜體</b></i>
		<sup>上標</sup>
		<sub>下標</sub>
		100<sub>2</sub><sup>2</sup>
		<br>
		<!-- 語意標籤 -->
		<strong>重要</strong>
		<em>強調</em>
		<ins>新增(插入)</ins>
		<del>刪除</del>
		<mark>標記</mark><hr>
		<p>
		不間段空白：|&nbsp;|&nbsp;|<br>
		半形空白：|&ensp;|&ensp;|<br>
		全形空白：|&emsp;|&emsp;|<hr>
		<!-- 特殊符號 -->&reg;&copy;
		</p>
		<pre>預格式化   
	文  字</pre>
		<hr>
		<ul type=circle><!-- Un-ordered list 無序清單 -->
		<!-- circle; -->
			<li>國文</li>
			<li>英文</li>
		</ul>
		<ol><!-- ordered list 有序清單 -->
			<li>國文</li>
			<li>英文</li>
		</ol>
	
	
	</body>
</html>
